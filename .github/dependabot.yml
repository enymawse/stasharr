# Dependabot configuration for automated dependency updates
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version and security updates for npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'Etc/UTC'
    # Increase the number of open pull requests for npm to 15
    open-pull-requests-limit: 15
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    # Add assignees for review
    assignees:
      - 'enymawse'
    # Add labels to categorize PRs
    labels:
      - 'dependencies'
      - 'automated'
    # Enable rebasing of PRs when conflicts occur
    rebase-strategy: 'auto'
    # Add commit message prefix for conventional commits
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    # Ignore specific packages that require manual updates
    ignore:
      # Ignore major version updates to prevent breaking changes
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions workflow updates
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '10:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'github-actions'
      - 'dependencies'
      - 'automated'
    assignees:
      - 'enymawse'
    commit-message:
      prefix: 'chore(actions)'
